<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ändra befintlig arbetserfarenhet</title>
</head>

<body>
    <header>
        <h1>Mitt CV</h1>
        <nav>
            <a href="index.html">Startsida</a>
            <a href="add.html">Lägg till</a>
            <a href="about.html">Om webbplatsen</a>
        </nav>
    </header>

    <main>
        <h1>Ändra arbetserfarenhet</h1>

        <div id="form-message"></div>

        <form id="workexperience-form">
            <div class="form-div">
                <label for="companyname">Företag</label>
                <input type="text" id="companyname" name="companyname" required>
            </div>

            <div class="form-div">
                <label for="jobtitle">Jobbtitel</label>
                <input type="text" id="jobtitle" name="jobtitle" required>
            </div>

            <div class="form-div">
                <label for="location">Plats</label>
                <input type="text" id="location" name="location" required>
            </div>

            <div class="form-div">
                <label for="startdate">Startdatum</label>
                <input type="date" id="startdate" name="startdate" required>
            </div>

            <div class="form-div">
                <label for="enddate">Slutdatum</label>
                <input type="date" id="enddate" name="enddate">
                <label for="ongoing">
                    <input type="checkbox" id="ongoing" name="ongoing">
                    Pågående anställning
                </label>
            </div>

            <div class="form-div">
                <label for="description">Beskrivning</label>
                <textarea name="description" id="description" required></textarea>
            </div>

            <button type="submit">Spara ändringar</button>
        </form>

    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>
    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
