<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/scss/style.scss">
    <title>Lägg till arbetserfarenhet</title>
</head>

<body>
    <header class="site-header">
        <h1 class="site-brand">Mitt CV</h1>
        <nav class="site-nav">
            <a class="site-nav-link" href="index.html">Startsida</a>
            <a class="site-nav-link" href="add.html">Lägg till</a>
            <a class="site-nav-link" href="about.html">Om webbplatsen</a>
        </nav>
    </header>

    <main class="page-main container">
        <h1 class="page-title">Lägg till arbetserfarenhet</h1>

        <div id="form-message" class="form-message"></div>

        <form id="workexperience-form" class="work-form" novalidate>
            <div class="form-div">
                <label for="companyname">Företag</label>
                <input type="text" id="companyname" name="companyname" required>
            </div>

            <div class="form-div">
                <label for="jobtitle">Jobbtitel</label>
                <input type="text" id="jobtitle" name="jobtitle" required>
            </div>

            <div class="form-div">
                <label for="location">Plats</label>
                <input type="text" id="location" name="location" required>
            </div>

            <div class="form-div">
                <label for="startdate">Startdatum</label>
                <input type="date" id="startdate" name="startdate" required>
            </div>

            <div class="form-div">
                <label for="enddate">Slutdatum</label>
                <input type="date" id="enddate" name="enddate">
                <label for="ongoing">
                    <input type="checkbox" id="ongoing" name="ongoing">
                    Pågående anställning
                </label>
            </div>

            <div class="form-div">
                <label for="description">Beskrivning</label>
                <textarea name="description" id="description" required></textarea>
            </div>

            <button class="form-submit-btn" type="submit">Lägg till</button>
        </form>
    </main>

   <footer class="site-footer">
    <p>&copy; 2026</p>
    <p>Denna webbplats är skapad av Fredrika Stjernlöf som ett delmoment i kursen Backendbaserad webbutveckling,
      Mittuniversitetet i Sundsvall.</p>
  </footer>
    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
